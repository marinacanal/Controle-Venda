<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Vendas</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <h1>Controle de Vendas</h1>
    </header>

    <section class="form-section">
        <form id="vendas-form">

            <div class="form-group">
                <label for="codigo-pedido">Código do Pedido</label>
                <input type="text" id="codigo-pedido" required placeholder="Ex: 1002">
            </div>

            <div class="form-group">
                <label for="nome-cliente">Nome do Cliente</label>
                <input type="text" id="nome-cliente" required placeholder="Ex: José da Silva">
            </div>

            <div class="form-group">
                <label for="forma-pagamento">Forma de Pagamento</label>
                <select id="forma-pagamento" required>
                    <option value="" disabled selected>Selecione...</option>
                    <option value="1/1">1/1 - À Vista</option>
                    <option value="5/2">5/2 - A Prazo</option>
                </select>
            </div>

            <div class="form-group">
                <label for="valor-venda">Valor da Venda (R$)</label>
                <input type="number" id="valor-venda" step="0.01" min="0.01" required placeholder="0,00">
            </div>

            <div class="form-group">
                <button type="submit" id="btn-salvar">Inserir</button>
            </div>

        </form>
    </section>

    <section class="total-vendido">
        <h3>Total Vendido no Mês</h3>
        <p id="total-mes">R$ 0,00</p>        
    </section>

    <section class="total-vendido-aberto">
        <h3>Total Vendido no Mês - Em Aberto</h3>
        <p id="total-mes-aberto">R$ 0,00</p>        
    </section>

    <button id="btn-exportar">Baixar Planilha</button>

    <section class="vendas-section">
        <h2>Vendas no Mês</h2>
        <table>
            <thead>
                <tr>
                    <th class="acoes">Ações</th>
                    <th>Data</th>
                    <th>Pedido</th>
                    <th>Cliente</th>
                    <th>Pagamento</th>
                    <th class="text-right">Vl. Venda</th>
                </tr>
            </thead>
            <tbody id="vendas-body">
            </tbody>
        </table>
    </section>
    
</body>
<footer>
    <p>&copy; 2026 Marina de Abreu Canal. Todos os direitos reservados.</p>
</footer>
</html>

<script src="index.js"></script>
